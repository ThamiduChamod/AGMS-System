server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Zone Service ??? ?? ???????
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**

        # Automation Service ??? ?? ???????
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/automation/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/